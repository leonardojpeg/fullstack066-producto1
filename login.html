<!-- Prompts IA (Gemini) 

1- Los form-control de bootstrap tenían una opción para diferentes tamaños, ¿cuales hay?
Respuesta: form-control-lg, form-control-sm

2. No consigo alinear los labels y los inputs del formulario, quedan raros de esta manera (se adjunta captura de pantalla y codigo del label e input del email). ¿Cómo los puedo ajustar?
Respuesta: Utiliza col-sm-4 en los labels y col-sm-8 en los inputs

3. Se podía evitar crear una lógica js para la validación de los formularios en el propio HTML, ¿cómo funciona?
Respuesta: required

4. ¿Hay alguna clase en bootstrap para que los inputs tengan un sombreado interior suave?
Respuesta: bg-light-subtle

-->

                    <label class="col-sm-4 col-form-label fw-bold h5">Contraseña:</label>
                    <div class="col-sm-8">
                        <input type="password" id="login-pass" class="form-control form-control-lg border-0 bg-light-subtle" placeholder="Contraseña" required>
                    </div>
                </div>

                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn-principal btn btn-lg px-5 py-2 fw-bold text-white shadow-sm">
                        Login
                    </button>
                </div>
            </form>

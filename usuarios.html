<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios | TechConnect</title>

  <!--
  IA utilizada: ChatGPT
  Prompt 1: Crea una página HTML5 para gestión de usuarios con Bootstrap.
  Prompt 2: Diseña una interfaz moderna con formulario y listado de usuarios.
  Prompt 3: Añade estructura responsive y consistente con el resto del proyecto.
  Prompt 4: Mejora la presentación visual de una zona de administración de usuarios.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">TechConnect</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menuNavbar">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="publicaciones.html">Publicaciones</a></li>
          <li class="nav-item"><a class="nav-link active" href="usuarios.html">Usuarios</a></li>
        </ul>

        <span class="navbar-text text-white me-3" id="usuarioNavbar"></span>
        <button class="btn btn-outline-light btn-sm" id="btnCerrarSesion">Cerrar sesión</button>
      </div>
    </div>
  </nav>
  
  <div id="alertasApp" class="position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>
  
  <main class="container py-5">
    <section class="mb-4">
      <h1 class="seccion-titulo">Gestión de usuarios</h1>
      <p class="subtitulo-seccion">
        Administra los usuarios registrados y crea nuevas cuentas dentro de la plataforma.
      </p>
     
    </section>

    <section class="row g-4">
      <div class="col-12 col-lg-4">
        <div class="card card-formulario fade-in-up">
          <h2 class="h4 mb-4">Nuevo usuario</h2>

          <form id="formUsuario">
            <div class="mb-3">
              <label class="form-label" for="nombre">Nombre</label>
              <input type="text" id="nombre" class="form-control" placeholder="Nombre completo">
            </div>

            <div class="mb-3">
              <label class="form-label" for="emailUsuario">Correo electrónico</label>
              <input type="email" id="emailUsuario" class="form-control" placeholder="ejemplo@correo.com">
            </div>

            <div class="mb-3">
              <label class="form-label" for="passwordUsuario">Contraseña</label>
              <input type="password" id="passwordUsuario" class="form-control" placeholder="Introduce una contraseña">
            </div>

            <div class="mb-3">
              <label class="form-label" for="rol">Rol</label>
              <select id="rol" class="form-select">
                <option value="">Selecciona un rol</option>
                <option value="admin">Administrador</option>
                <option value="usuario">Usuario</option>
              </select>
            </div>

            <div id="mensajeUsuario" class="alert alert-danger alerta-oculta"></div>

            <button type="submit" class="btn btn-primary btn-custom w-100">
              Guardar usuario
            </button>
          </form>
        </div>
      </div>

      <div class="col-12 col-lg-8">
        <div class="row g-4" id="contenedorUsuarios"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/usuarios.js"></script>
</body>
</html>

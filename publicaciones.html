<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicaciones | TechConnect</title>

  <!--
  IA utilizada: ChatGPT
  Prompt 1: Crea una página HTML5 para gestionar ofertas y demandas con Bootstrap.
  Prompt 2: Diseña un formulario profesional y una zona de listado de publicaciones.
  Prompt 3: Propón una estructura responsive con dos columnas.
  Prompt 4: Añade un contador de publicaciones y un sistema de alertas visuales.
  -->

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- CSS propio -->
  <link rel="stylesheet" href="css/styles.css">

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

      <a class="navbar-brand" href="dashboard.html">
        TechConnect
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menuNavbar">

        <ul class="navbar-nav me-auto">

          <li class="nav-item">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="publicaciones.html">Publicaciones</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="usuarios.html">Usuarios</a>
          </li>

        </ul>

        <span class="navbar-text text-white me-3" id="usuarioNavbar"></span>

        <button class="btn btn-outline-light btn-sm" id="btnCerrarSesion">
          Cerrar sesión
        </button>

      </div>
    </div>
  </nav>


  <!-- ALERTAS -->
  <div id="alertasApp"
       class="position-fixed top-0 end-0 p-3"
       style="z-index:1050;">
  </div>


  <!-- CONTENIDO -->
  <main class="container py-5">

    <!-- CABECERA -->
    <section class="mb-4">

      <h1 class="seccion-titulo">
        Gestión de ofertas y demandas
      </h1>

      <p class="subtitulo-seccion">
        Crea nuevas publicaciones y consulta todas las oportunidades registradas en la plataforma.
      </p>

    </section>


    <section class="row g-4">

      <!-- FORMULARIO -->
      <div class="col-12 col-lg-4">

        <div class="card card-formulario fade-in-up">

          <h2 class="h4 mb-4">
            Nueva publicación
          </h2>

          <form id="formPublicacion">

            <div class="mb-3">

              <label class="form-label" for="tipo">
                Tipo
              </label>

              <select id="tipo" class="form-select">

                <option value="">
                  Selecciona una opción
                </option>

                <option value="oferta">
                  Oferta
                </option>

                <option value="demanda">
                  Demanda
                </option>

              </select>

            </div>


            <div class="mb-3">

              <label class="form-label" for="titulo">
                Título
              </label>

              <input
                type="text"
                id="titulo"
                class="form-control"
                placeholder="Ej. Desarrollador Frontend Junior">

            </div>


            <div class="mb-3">

              <label class="form-label" for="descripcion">
                Descripción
              </label>

              <textarea
                id="descripcion"
                class="form-control"
                rows="4"
                placeholder="Describe la publicación">
              </textarea>

            </div>


            <div class="mb-3">

              <label class="form-label" for="autor">
                Autor / Empresa
              </label>

              <input
                type="text"
                id="autor"
                class="form-control"
                placeholder="Nombre de la empresa o persona">

            </div>


            <div class="mb-3">

              <label class="form-label" for="ubicacion">
                Ubicación
              </label>

              <input
                type="text"
                id="ubicacion"
                class="form-control"
                placeholder="Ej. Madrid o remoto">

            </div>


            <div class="mb-3">

              <label class="form-label" for="categoria">
                Categoría
              </label>

              <input
                type="text"
                id="categoria"
                class="form-control"
                placeholder="Ej. Frontend, Backend, Diseño">

            </div>


            <div
              id="mensajePublicacion"
              class="alert alert-danger alerta-oculta">
            </div>


            <button
              type="submit"
              class="btn btn-primary btn-custom w-100">

              Guardar publicación

            </button>

          </form>

        </div>

      </div>


      <!-- LISTADO PUBLICACIONES -->
      <div class="col-12 col-lg-8">

        <!-- CONTADOR -->
        <div class="d-flex justify-content-between align-items-center mb-3">

          <h2 class="h5 mb-0">
            Publicaciones registradas
          </h2>

          <span
            id="contadorPublicaciones"
            class="badge bg-dark">

            0

          </span>

        </div>


        <!-- CONTENEDOR DINÁMICO -->
        <div
          class="row g-4"
          id="contenedorPublicaciones">
        </div>

      </div>

    </section>

  </main>


  <!-- BOOTSTRAP JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- SCRIPT PRINCIPAL -->
  <script
    type="module"
    src="js/publicaciones.js">
  </script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Savia Nueva - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="body"> 

    <header class="header-image text-white d-flex align-items-start p-5">
        <h1 class="display-3 fw-bold" style="text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">SAVIA NUEVA</h1>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 sticky-top">
        <div class="container-fluid">
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-4 text-uppercase fw-semibold pt-3 pt-lg-0"> 
                    <li class="nav-item">
                        <a class="nav-link fs-5" href="index.html">Anuncios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fs-5" href="gestion-ofertas-demandas.html">Ofertas y demandas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fs-5" href="registro.html">Registrarse</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fs-5" href="login.html">Login</a>
                    </li>
                    <li class="nav-item d-flex align-items-center mt-3 mt-lg-0"> 
                        <span class="nav-link text-warning fs-5 border border-warning rounded px-3" id="user-display">
                        -Usuario-
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <main class="container my-5">
        <div class="row g-5">
            <div class="col-md-5">
                <div class="secondary-container p-4 shadow-lg text-white">
                    <h3 class="text-center fw-bold mb-4">NUEVO USUARIO</h3>
                    <form id="form-registro">
                        <div class="mb-3">
                            <label class="fw-bold">Nombre:</label>
                            <input type="text" id="reg-nombre" class="form-control border-0 bg-light-subtle" required>
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Email:</label>
                            <input type="email" id="reg-email" class="form-control border-0 bg-light-subtle" required>
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Contraseña:</label>
                            <input type="password" id="reg-pass" class="form-control border-0 bg-light-subtle" required>
                        </div>
                        <div class="mb-4">
                            <label class="fw-bold">Tipo de usuario:</label>
                            <select id="reg-rol" class="form-select border-0 bg-light-subtle" required>
                                <option value="" selected disabled>Selecciona una opción</option>
                                <option value="candidato">Candidato</option>
                                <option value="empresa">Empresa</option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-center">
                            <button type="submit" class="btn-principal btn px-5 py-2 fw-bold text-white shadow-sm" style="border-radius: 10px; border: none;">
                                Registrarse
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="main-container p-4 shadow-sm rounded-4">
                    <h3 class="text-black fw-bold mb-4 text-uppercase">Gestión de Usuarios</h3>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Nombre</th>
                                    <th>Email</th>
                                    <th>Rol</th>
                                    <th class="text-center">Eliminar</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-usuarios-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white pt-5 pb-3 mt-5">
        <div class="container text-center text-md-start">
            <div class="row text-center text-md-start">
                <div class="col-md-3 col-lg-3 col-xl-3 mx-auto mt-3">
                    <h5 class="text-center text-uppercase mb-4 font-weight-bold">Datos Legales</h5>
                    <p><a href="#" class="text-white text-decoration-none">Enlace 1</a></p>
                    <p><a href="#" class="text-white text-decoration-none">Enlace 2</a></p>
                </div>
                <div class="col-md-2 col-lg-2 col-xl-2 mx-auto mt-3">
                    <h5 class="text-center text-uppercase mb-4 font-weight-bold">Otros</h5>
                    <p class="text-center">Otros 1</p>
                    <p class="text-center">Otros 2</p>
                </div>
                <div class="col-md-4 col-lg-3 col-xl-3 mx-auto mt-3">
                    <h5 class="text-center text-uppercase mb-4 font-weight-bold">Contactar</h5>
                    <p class="text-center">Tlf. ficticio</p>
                    <p class="text-center">Email ficticio</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/controller.js"></script>
</body>
</html>
